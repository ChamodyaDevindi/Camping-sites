spring.application.name=CampNest

# MySQL Database connection
spring.datasource.url=jdbc:mysql://localhost:3306/campnest_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# Hibernate configurations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server port
server.port=8080

# JWT Secret (Move to env vars in production)
campnest.app.jwtSecret=CampNestSecretKeyForJWTAuthenticationWhichShouldBeVeryLongAndSecure
campnest.app.jwtExpirationMs=86400000

# File Upload Max Size
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
